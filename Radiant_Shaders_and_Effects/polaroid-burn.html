<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polaroid Burn</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Polaroid Burn</div>
<canvas id="canvas"></canvas>
<script>
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = 'attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0,1);}';

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_burnSpeed;',
    'uniform float u_photoCount;',
    'uniform vec2 u_mouse;',
    '',
    '// --- Hash / noise utilities ---',
    'float hash(float n){ return fract(sin(n)*43758.5453123); }',
    'float hash2(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453123); }',
    '',
    'vec2 hash2v(vec2 p){',
    '  return vec2(hash2(p), hash2(p + vec2(37.0, 91.0)));',
    '}',
    '',
    '// Simplex-like 2D noise',
    'vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec2 mod289v2(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}',
    'vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}',
    '',
    'float snoise(vec2 v){',
    '  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);',
    '  vec2 i=floor(v+dot(v,C.yy));',
    '  vec2 x0=v-i+dot(i,C.xx);',
    '  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);',
    '  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;',
    '  i=mod289v2(i);',
    '  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));',
    '  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);',
    '  m=m*m; m=m*m;',
    '  vec3 x=2.0*fract(p*C.www)-1.0;',
    '  vec3 h=abs(x)-0.5;',
    '  vec3 ox=floor(x+0.5);',
    '  vec3 a0=x-ox;',
    '  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);',
    '  vec3 g;',
    '  g.x=a0.x*x0.x+h.x*x0.y;',
    '  g.yz=a0.yz*x12.xz+h.yz*x12.yw;',
    '  return 130.0*dot(m,g);',
    '}',
    '',
    'float fbm(vec2 p){',
    '  float f=0.0;',
    '  f+=0.5000*snoise(p); p*=2.02;',
    '  f+=0.2500*snoise(p); p*=2.03;',
    '  f+=0.1250*snoise(p); p*=2.01;',
    '  f+=0.0625*snoise(p);',
    '  return f;',
    '}',
    '',
    '// Rotation matrix',
    'mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }',
    '',
    '// Rounded rectangle SDF',
    'float roundedRectSDF(vec2 p, vec2 halfSize, float radius){',
    '  vec2 d=abs(p)-halfSize+radius;',
    '  return length(max(d, 0.0))+min(max(d.x,d.y), 0.0)-radius;',
    '}',
    '',
    '// Get deterministic polaroid properties from index',
    'vec2 getPhotoPos(float idx){',
    '  float hx = hash(idx * 73.156);',
    '  float hy = hash(idx * 127.843);',
    '  return vec2(hx * 1.2 - 0.6, hy * 0.8 - 0.4);',
    '}',
    '',
    'float getPhotoAngle(float idx){',
    '  return (hash(idx * 231.71) - 0.5) * 0.6;',
    '}',
    '',
    'float getPhotoPhase(float idx){',
    '  return hash(idx * 347.29) * 6.2831853;',
    '}',
    '',
    '// Warm nostalgic gradient for "photo" content',
    'vec3 photoGradient(vec2 localUV, float idx){',
    '  float n1 = fbm(localUV * 2.0 + vec2(hash(idx*13.0)*10.0, hash(idx*29.0)*10.0));',
    '  float n2 = fbm(localUV * 1.5 + vec2(hash(idx*53.0)*10.0, hash(idx*67.0)*10.0));',
    '',
    '  // Olivia Rodrigo nostalgia palette: faded pinks, amber, soft purple',
    '  vec3 c1 = vec3(0.85, 0.45, 0.55);  // faded pink',
    '  vec3 c2 = vec3(0.82, 0.58, 0.32);  // amber',
    '  vec3 c3 = vec3(0.55, 0.38, 0.65);  // soft purple',
    '  vec3 c4 = vec3(0.90, 0.72, 0.55);  // warm peach',
    '  vec3 c5 = vec3(0.65, 0.30, 0.45);  // dusty rose',
    '',
    '  float blend = n1 * 0.5 + 0.5;',
    '  float blend2 = n2 * 0.5 + 0.5;',
    '  float idxMod = hash(idx * 91.0);',
    '',
    '  vec3 colA = mix(c1, c2, blend);',
    '  vec3 colB = mix(c3, c4, blend2);',
    '  vec3 col = mix(colA, colB, idxMod);',
    '  col = mix(col, c5, smoothstep(0.4, 0.9, localUV.y) * 0.3);',
    '',
    '  // Add gentle vignette inside the photo',
    '  float photoVig = 1.0 - length(localUV) * 0.6;',
    '  col *= 0.7 + 0.3 * clamp(photoVig, 0.0, 1.0);',
    '',
    '  return col;',
    '}',
    '',
    '// Compute a single polaroid contribution',
    '// Returns vec4(rgb, alpha)',
    'vec4 polaroid(vec2 p, float idx, float time, float px){',
    '  vec2 center = getPhotoPos(idx);',
    '  float angle = getPhotoAngle(idx);',
    '  float phase = getPhotoPhase(idx);',
    '',
    '  // Cycle duration and phase',
    '  float cycleDur = 6.2831853;',
    '  float t = mod(time * u_burnSpeed + phase, cycleDur);',
    '  float tNorm = t / cycleDur; // 0..1 cycle',
    '',
    '  // Lifecycle phases:',
    '  // 0.0 - 0.15: fade in from black (develop)',
    '  // 0.15 - 0.45: full color (peak exposure)',
    '  // 0.45 - 0.75: overexpose to white + burn edges',
    '  // 0.75 - 0.95: burn out with embers',
    '  // 0.95 - 1.0: fade to nothing',
    '',
    '  // Overall visibility envelope',
    '  float appear = smoothstep(0.0, 0.05, tNorm);',
    '  float disappear = 1.0 - smoothstep(0.90, 1.0, tNorm);',
    '  float visibility = appear * disappear;',
    '',
    '  if(visibility < 0.001) return vec4(0.0);',
    '',
    '  // Transform coordinate into polaroid space',
    '  vec2 lp = p - center;',
    '  lp = rot(angle) * lp;',
    '',
    '  // Polaroid dimensions (photo + border)',
    '  vec2 outerSize = vec2(0.16, 0.20);  // outer polaroid frame',
    '  vec2 innerSize = vec2(0.13, 0.13);  // inner photo area (square)',
    '  vec2 innerOffset = vec2(0.0, -0.02); // photo shifted up (bigger bottom border)',
    '  float cornerR = 0.006;',
    '  float aa = px * 2.0;  // pixel-relative anti-aliasing width',
    '',
    '  // Outer frame SDF',
    '  float outerD = roundedRectSDF(lp, outerSize, cornerR);',
    '  float outerMask = smoothstep(aa, 0.0, outerD);',
    '',
    '  if(outerMask < 0.001) return vec4(0.0);',
    '',
    '  // Inner photo SDF',
    '  float innerD = roundedRectSDF(lp - innerOffset, innerSize, 0.003);',
    '  float innerMask = smoothstep(aa, 0.0, innerD);',
    '',
    '  // Photo UV for gradient',
    '  vec2 photoUV = (lp - innerOffset) / innerSize;',
    '',
    '  // --- Develop phase ---',
    '  float developAmount = smoothstep(0.0, 0.20, tNorm);',
    '',
    '  // --- Overexposure phase ---',
    '  float overexpose = smoothstep(0.40, 0.70, tNorm);',
    '',
    '  // --- Burn phase ---',
    '  float burnPhase = smoothstep(0.50, 0.85, tNorm);',
    '',
    '  // Noise-driven burn edge propagation',
    '  float burnNoise = fbm(lp * 12.0 + vec2(hash(idx*17.0)*5.0, hash(idx*31.0)*5.0));',
    '  burnNoise += snoise(lp * 20.0 + time * 0.3) * 0.3;',
    '  float burnEdgeDist = -outerD * 8.0; // distance from edge, normalized',
    '  float burnMask = smoothstep(0.0, 1.0, burnPhase * 3.0 - burnEdgeDist - burnNoise * 0.5);',
    '',
    '  // --- Compose the polaroid ---',
    '',
    '  // Paper white with slight warm tint',
    '  vec3 paperColor = vec3(0.95, 0.93, 0.90);',
    '',
    '  // Photo content',
    '  vec3 photoColor = photoGradient(photoUV, idx);',
    '',
    '  // Develop: fade from dark to color',
    '  photoColor = mix(vec3(0.02, 0.01, 0.02), photoColor, developAmount);',
    '',
    '  // Overexpose: push toward blown-out white',
    '  photoColor = mix(photoColor, vec3(1.0, 0.98, 0.95), overexpose * 0.85);',
    '',
    '  // Paper also overexposes',
    '  paperColor = mix(paperColor, vec3(1.0), overexpose * 0.3);',
    '',
    '  // Combine paper border and photo area',
    '  vec3 polaroidColor = mix(paperColor, photoColor, innerMask);',
    '',
    '  // Apply burn: charred black edges with glowing amber embers',
    '  float emberGlow = burnMask * (1.0 - smoothstep(0.0, 0.5, burnMask));',
    '  vec3 emberColor = vec3(1.0, 0.5, 0.1) * 2.0; // bright amber-orange glow',
    '  vec3 charColor = vec3(0.03, 0.02, 0.01);',
    '',
    '  // Burning edge: char -> ember glow -> transparent',
    '  polaroidColor = mix(polaroidColor, charColor, smoothstep(0.0, 0.5, burnMask));',
    '  polaroidColor += emberColor * emberGlow * 1.5;',
    '',
    '  // Subtle paper shadow / depth',
    '  float shadow = smoothstep(0.0, 0.02, -outerD) * 0.15;',
    '',
    '  // Alpha: frame mask, visibility, and burn-through',
    '  float burnHole = smoothstep(0.6, 1.0, burnMask);',
    '  float alpha = outerMask * visibility * (1.0 - burnHole);',
    '',
    '  // Add subtle shadow under the polaroid',
    '  float shadowD = roundedRectSDF(lp + vec2(0.004, 0.006), outerSize + 0.01, cornerR);',
    '  float shadowMask = smoothstep(0.02, 0.0, shadowD) * 0.25 * visibility * (1.0 - burnPhase);',
    '',
    '  return vec4(polaroidColor + shadowMask * 0.01, alpha + shadowMask * (1.0 - alpha));',
    '}',
    '',
    'void main(){',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  vec2 aspect = vec2(u_res.x / u_res.y, 1.0);',
    '  vec2 p = (uv - 0.5) * aspect;',
    '  // Mouse: compute heat source at cursor',
    '  float mouseHeat = 0.0;',
    '  if (u_mouse.x > 0.0) {',
    '    vec2 mP = (u_mouse / u_res - 0.5) * aspect;',
    '    float mDist = length(p - mP);',
    '    mouseHeat = exp(-mDist * mDist * 8.0);',
    '  }',
    '  float t = u_time;',
    '  float px = 1.0 / min(u_res.x, u_res.y);',
    '',
    '  // Background: very subtle animated noise texture',
    '  vec3 bg = vec3(0.039, 0.039, 0.039);',
    '  float bgNoise = snoise(p * 3.0 + t * 0.02) * 0.008;',
    '  bg += bgNoise;',
    '',
    '  // Subtle ambient warm glow in background',
    '  float ambientGlow = exp(-length(p) * 2.5) * 0.03;',
    '  bg += vec3(0.8, 0.5, 0.3) * ambientGlow;',
    '',
    '  vec3 col = bg;',
    '',
    '  // Render polaroids back to front',
    '  int maxPhotos = 8;',
    '  for(int i = 0; i < 8; i++){',
    '    if(float(i) >= u_photoCount) break;',
    '    float idx = float(i);',
    '    vec4 p4 = polaroid(p, idx, t, px);',
    '',
    '    // Premultiplied alpha composite',
    '    col = mix(col, p4.rgb, p4.a);',
    '  }',
    '',
    '  // Mouse heat: ember glow at cursor',
    '  if (mouseHeat > 0.01) {',
    '    col += vec3(1.0, 0.5, 0.1) * mouseHeat * 0.4;',
    '    col = mix(col, vec3(0.15, 0.05, 0.0), mouseHeat * 0.3);',
    '  }',
    '',
    '  // Global vignette',
    '  float vig = 1.0 - smoothstep(0.4, 1.2, length(p * vec2(0.85, 1.0)));',
    '  col *= 0.65 + 0.35 * vig;',
    '',
    '  // Film grain',
    '  float grain = (fract(sin(dot(gl_FragCoord.xy, vec2(12.9898,78.233)) + fract(u_time*0.1)*100.0)*43758.5453) - 0.5) * 0.02;',
    '  col += grain;',
    '',
    '  // Tone mapping: subtle S-curve',
    '  col = clamp(col, 0.0, 1.0);',
    '  col = col * col * (3.0 - 2.0 * col);',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uBurnSpeed = gl.getUniformLocation(prog, 'u_burnSpeed');
  var uPhotoCount = gl.getUniformLocation(prog, 'u_photoCount');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');

  var mouseXVal = -1.0, mouseYVal = -1.0;

  canvas.addEventListener('mousemove', function(e) {
    mouseXVal = e.clientX * dpr;
    mouseYVal = (canvas.clientHeight - e.clientY) * dpr;
  });
  canvas.addEventListener('mouseleave', function() {
    mouseXVal = -1.0; mouseYVal = -1.0;
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, { passive: false });
  canvas.addEventListener('touchend', function() {
    mouseXVal = -1.0; mouseYVal = -1.0;
  });

  var burnSpeedVal = 0.6;
  var photoCountVal = 5.0;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var needsResize = true;
  var running = true;
  var rafId = 0;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
    var h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      gl.viewport(0, 0, w, h);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    }
  }

  function render(now) {
    if (!running) return;
    if (needsResize) resize();
    gl.uniform1f(uTime, prefersReduced ? 0.0 : now * 0.001);
    gl.uniform1f(uBurnSpeed, burnSpeedVal);
    gl.uniform1f(uPhotoCount, photoCountVal);
    gl.uniform2f(uMouse, mouseXVal, mouseYVal);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    rafId = requestAnimationFrame(render);
  }

  window.addEventListener('resize', function () {
    needsResize = true;
  });

  resize();

  rafId = requestAnimationFrame(render);

  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      running = false;
      if (rafId) cancelAnimationFrame(rafId);
    } else {
      running = true;
      rafId = requestAnimationFrame(render);
    }
  });

  // IntersectionObserver for iframe embedding
  if (typeof IntersectionObserver !== 'undefined') {
    var observer = new IntersectionObserver(function(entries) {
      var visible = entries[0].isIntersecting;
      if (!visible && running) {
        running = false;
        if (rafId) cancelAnimationFrame(rafId);
      } else if (visible && !running && !document.hidden) {
        running = true;
        rafId = requestAnimationFrame(render);
      }
    }, { threshold: 0.1 });
    observer.observe(canvas);
  }

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'param') {
      switch (e.data.name) {
        case 'BURN_SPEED': burnSpeedVal = e.data.value; break;
        case 'PHOTO_COUNT': photoCountVal = e.data.value; break;
      }
    }
  });
})();
</script>
