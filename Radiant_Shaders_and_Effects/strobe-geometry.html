<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strobe Geometry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(200, 149, 108, 0.5);
    z-index: 10;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div class="label">Strobe Geometry</div>
<canvas id="canvas"></canvas>
<script>
// ─────────────────────────────────────────────
// Strobe Geometry — Sharp geometric shapes flash into existence,
// leaving glowing afterimage silhouettes that fade cyan → magenta → dark
// ─────────────────────────────────────────────
(function () {
  var canvas = document.getElementById('canvas');
  var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var gl = canvas.getContext('webgl', { alpha: false, antialias: false, preserveDrawingBuffer: false });
  if (!gl) return;

  var vertSrc = [
    'attribute vec2 a_pos;',
    'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
  ].join('\n');

  var fragSrc = [
    'precision highp float;',
    'uniform float u_time;',
    'uniform vec2 u_res;',
    'uniform float u_flashRate;',
    'uniform float u_glowIntensity;',
    'uniform vec2 u_mouse;',
    '',
    '#define PI 3.141592653589793',
    '#define TAU 6.283185307179586',
    '#define MAX_SHAPES 8',
    '',
    '// ── ACES tone mapping ──',
    'vec3 ACESFilm(vec3 x) {',
    '  float a = 2.51;',
    '  float b = 0.03;',
    '  float c = 2.43;',
    '  float d = 0.59;',
    '  float e = 0.14;',
    '  return clamp((x * (a * x + b)) / (x * (c * x + d) + e), 0.0, 1.0);',
    '}',
    '',
    '// ── Hash ──',
    'float hash(float n) {',
    '  return fract(sin(n) * 43758.5453123);',
    '}',
    '',
    'vec2 hash2(float n) {',
    '  return vec2(hash(n), hash(n + 7.31));',
    '}',
    '',
    '// ── Value noise for background texture ──',
    'float vnoise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  float n = i.x + i.y * 57.0;',
    '  return mix(mix(hash(n), hash(n + 1.0), f.x),',
    '             mix(hash(n + 57.0), hash(n + 58.0), f.x), f.y);',
    '}',
    '',
    '// ── 2D rotation ──',
    'mat2 rot2(float a) {',
    '  float c = cos(a); float s = sin(a);',
    '  return mat2(c, -s, s, c);',
    '}',
    '',
    '// ── SDF primitives ──',
    '',
    '// Equilateral triangle SDF',
    'float sdTriangle(vec2 p, float r) {',
    '  float k = sqrt(3.0);',
    '  p.x = abs(p.x) - r;',
    '  p.y = p.y + r / k;',
    '  if (p.x + k * p.y > 0.0) p = vec2(p.x - k * p.y, -k * p.x - p.y) / 2.0;',
    '  p.x -= clamp(p.x, -2.0 * r, 0.0);',
    '  return -length(p) * sign(p.y);',
    '}',
    '',
    '// Box SDF (parallelogram via skewed coordinates)',
    'float sdBox(vec2 p, vec2 b) {',
    '  vec2 d = abs(p) - b;',
    '  return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);',
    '}',
    '',
    '// Parallelogram SDF',
    'float sdParallelogram(vec2 p, float wi, float he, float sk) {',
    '  vec2 e = vec2(sk, he);',
    '  p = (p.y < 0.0) ? -p : p;',
    '  vec2 w = p - e;',
    '  w.x -= clamp(w.x, -wi, wi);',
    '  vec2 d = vec2(dot(w, w), -w.y);',
    '  float s = p.x * e.y - p.y * e.x;',
    '  p = (s < 0.0) ? -p : p;',
    '  vec2 v = p - vec2(wi, 0);',
    '  v -= e * clamp(dot(v, e) / dot(e, e), -1.0, 1.0);',
    '  d = min(d, vec2(dot(v, v), wi * he - abs(s)));',
    '  return sqrt(d.x) * sign(-d.y);',
    '}',
    '',
    '// Rhombus / diamond SDF',
    'float sdRhombus(vec2 p, vec2 b) {',
    '  vec2 q = abs(p);',
    '  float h = clamp((-2.0 * dot(q, b) + dot(b, b)) / dot(b, b), -1.0, 1.0);',
    '  float d = length(q - 0.5 * b * vec2(1.0 - h, 1.0 + h));',
    '  return d * sign(q.x * b.y + q.y * b.x - b.x * b.y);',
    '}',
    '',
    '// Hexagon SDF',
    'float sdHexagon(vec2 p, float r) {',
    '  vec2 q = abs(p);',
    '  float d = dot(q, normalize(vec2(1.0, 1.732)));',
    '  return max(d, q.y) - r;',
    '}',
    '',
    '// Trapezoid SDF',
    'float sdTrapezoid(vec2 p, float r1, float r2, float he) {',
    '  vec2 k1 = vec2(r2, he);',
    '  vec2 k2 = vec2(r2 - r1, 2.0 * he);',
    '  p.x = abs(p.x);',
    '  vec2 ca = vec2(max(0.0, p.x - ((p.y < 0.0) ? r1 : r2)), abs(p.y) - he);',
    '  vec2 cb = p - k1 + k2 * clamp(dot(k1 - p, k2) / dot(k2, k2), 0.0, 1.0);',
    '  float s = (cb.x < 0.0 && ca.y < 0.0) ? -1.0 : 1.0;',
    '  return s * sqrt(min(dot(ca, ca), dot(cb, cb)));',
    '}',
    '',
    '// ── Shape evaluation ──',
    '// Returns SDF for shape type 0-4',
    'float evalShape(vec2 p, int type, float scale) {',
    '  float d = 1e5;',
    '  if (type == 0) {',
    '    // Equilateral triangle',
    '    d = sdTriangle(p, scale * 0.36);',
    '  } else if (type == 1) {',
    '    // Wide parallelogram',
    '    d = sdParallelogram(p, scale * 0.38, scale * 0.14, scale * 0.15);',
    '  } else if (type == 2) {',
    '    // Elongated diamond',
    '    d = sdRhombus(p, vec2(scale * 0.12, scale * 0.40));',
    '  } else if (type == 3) {',
    '    // Hexagon segment',
    '    d = sdHexagon(p, scale * 0.25);',
    '  } else if (type == 4) {',
    '    // Trapezoid',
    '    d = sdTrapezoid(p, scale * 0.15, scale * 0.35, scale * 0.18);',
    '  }',
    '  return d;',
    '}',
    '',
    '// ── Color decay sequence ──',
    '// Maps a decay phase (0=born, 1=gone) to color',
    'vec3 decayColor(float phase) {',
    '  // 0.0-0.05: white flash',
    '  // 0.05-0.25: cyan',
    '  // 0.25-0.50: electric blue',
    '  // 0.50-0.75: magenta',
    '  // 0.75-1.0: deep purple → gone',
    '  vec3 white    = vec3(1.0, 1.0, 1.0);',
    '  vec3 cyan     = vec3(0.0, 0.95, 1.0);',
    '  vec3 blue     = vec3(0.15, 0.4, 1.0);',
    '  vec3 magenta  = vec3(0.95, 0.1, 0.85);',
    '  vec3 purple   = vec3(0.35, 0.05, 0.55);',
    '  vec3 dark     = vec3(0.05, 0.01, 0.1);',
    '',
    '  vec3 col = dark;',
    '  if (phase < 0.05) {',
    '    col = mix(white, white, phase / 0.05);',
    '  } else if (phase < 0.20) {',
    '    col = mix(white, cyan, (phase - 0.05) / 0.15);',
    '  } else if (phase < 0.40) {',
    '    col = mix(cyan, blue, (phase - 0.20) / 0.20);',
    '  } else if (phase < 0.65) {',
    '    col = mix(blue, magenta, (phase - 0.40) / 0.25);',
    '  } else if (phase < 0.85) {',
    '    col = mix(magenta, purple, (phase - 0.65) / 0.20);',
    '  } else {',
    '    col = mix(purple, dark, (phase - 0.85) / 0.15);',
    '  }',
    '  return col;',
    '}',
    '',
    '// ── Per-shape parameters from hash ──',
    'struct ShapeData {',
    '  vec2 center;',
    '  float rotation;',
    '  float scale;',
    '  int type;',
    '  float birthTime;',
    '};',
    '',
    'ShapeData getShape(int idx, float flashInterval) {',
    '  ShapeData s;',
    '',
    '  float fi = float(idx);',
    '',
    '  // Musical timing: strong beat (even idx), weak beat (odd idx)',
    '  bool isStrong = (mod(fi, 2.0) < 0.5);',
    '',
    '  // Hash-based position, rotation, type — changes each cycle',
    '  float cycleLen = float(MAX_SHAPES) * flashInterval;',
    '  float cycle = floor(u_time / cycleLen);',
    '  float seed = fi * 13.37 + cycle * 97.31;',
    '',
    '  // Timing jitter: +/-10% humanization on interval',
    '  float jitter = (hash(seed + 10.0) - 0.5) * 0.2 * flashInterval;',
    '  s.birthTime = fi * flashInterval + jitter;',
    '',
    '  // Position: spread across screen with some randomness',
    '  vec2 basePos = hash2(seed + 1.0) * 2.0 - 1.0;',
    '  s.center = basePos * vec2(0.65, 0.50);',
    '',
    '  // Rotation: dramatic angles — quantized to bold increments + randomness',
    '  float baseAngle = floor(hash(seed + 2.0) * 8.0) * (PI / 4.0);',
    '  float angleJitter = (hash(seed + 5.0) - 0.5) * (PI / 6.0);',
    '  s.rotation = baseAngle + angleJitter;',
    '',
    '  // Scale: wide variety, strong beats are bigger',
    '  float baseScale = 0.4 + hash(seed + 3.0) * 1.2;',
    '  s.scale = isStrong ? baseScale * 1.3 : baseScale * 0.7;',
    '',
    '  // Shape type',
    '  s.type = int(mod(hash(seed + 4.0) * 5.0, 5.0));',
    '',
    '  return s;',
    '}',
    '',
    'void main() {',
    '  vec2 fragCoord = gl_FragCoord.xy;',
    '  vec2 uv = fragCoord / u_res;',
    '  float aspect = u_res.x / u_res.y;',
    '',
    '  // Aspect-corrected centered coordinates',
    '  vec2 mouseShift = vec2(0.0);',
    '  if (u_mouse.x > 0.0) {',
    '    vec2 mUV = u_mouse / u_res;',
    '    mouseShift = -(mUV - 0.5) * 0.15;',
    '  }',
    '  vec2 p = (uv - 0.5) * vec2(aspect, 1.0);',
    '',
    '  float t = u_time;',
    '  float flashInterval = u_flashRate;',
    '  float decayDuration = 4.0;',
    '  float cycleLen = float(MAX_SHAPES) * flashInterval;',
    '',
    '  // Time within the current cycle',
    '  float cycleTime = mod(t, cycleLen);',
    '',
    '  // ── Background ──',
    '  // Dark blue-purple base with subtle noise texture',
    '  vec3 bg = vec3(0.015, 0.012, 0.025);',
    '  float bgNoise = vnoise(p * 3.0 + t * 0.05) * 0.4 + vnoise(p * 7.0 - t * 0.03) * 0.3;',
    '  bgNoise += vnoise(p * 1.5 + vec2(t * 0.02, -t * 0.01)) * 0.3;',
    '  bg += vec3(0.008, 0.006, 0.015) * bgNoise;',
    '',
    '  // Background pulse: brightens with each new shape (more visible)',
    '  float currentShapeIdx = floor(cycleTime / flashInterval);',
    '  float timeSinceLastFlash = cycleTime - currentShapeIdx * flashInterval;',
    '  bool currentIsStrong = (mod(currentShapeIdx, 2.0) < 0.5);',
    '  float bgPulseStrength = currentIsStrong ? 0.18 : 0.08;',
    '  float bgPulse = exp(-timeSinceLastFlash * 6.0) * bgPulseStrength;',
    '  bg += vec3(0.08, 0.06, 0.12) * bgPulse;',
    '',
    '  vec3 col = bg;',
    '',
    '  // ── Process each shape ──',
    '  // We check shapes from two cycles: current and previous,',
    '  // so fading shapes from the last cycle are still visible',
    '  for (int ci = 0; ci < 2; ci++) {',
    '',
    '    for (int i = 0; i < MAX_SHAPES; i++) {',
    '      ShapeData shape = getShape(i, flashInterval);',
    '',
    '      // For previous cycle, adjust birth times and use previous cycle seed',
    '      float birthT = shape.birthTime;',
    '      float fi = float(i);',
    '      bool isStrong = (mod(fi, 2.0) < 0.5);',
    '      if (ci == 1) {',
    '        // Previous cycle shapes — recalculate with previous cycle hash',
    '        float prevCycle = floor(t / cycleLen) - 1.0;',
    '        float seed = fi * 13.37 + prevCycle * 97.31;',
    '        shape.center = (hash2(seed + 1.0) * 2.0 - 1.0) * vec2(0.65, 0.50);',
    '        float baseAngle = floor(hash(seed + 2.0) * 8.0) * (PI / 4.0);',
    '        float angleJitter = (hash(seed + 5.0) - 0.5) * (PI / 6.0);',
    '        shape.rotation = baseAngle + angleJitter;',
    '        float baseScale = 0.4 + hash(seed + 3.0) * 1.2;',
    '        shape.scale = isStrong ? baseScale * 1.3 : baseScale * 0.7;',
    '        shape.type = int(mod(hash(seed + 4.0) * 5.0, 5.0));',
    '        float jitter = (hash(seed + 10.0) - 0.5) * 0.2 * flashInterval;',
    '        shape.birthTime = fi * flashInterval + jitter;',
    '        birthT = shape.birthTime - cycleLen;',
    '      }',
    '',
    '      // Age of this shape',
    '      float age = cycleTime - birthT;',
    '      if (ci == 1) age = cycleTime + cycleLen - shape.birthTime;',
    '',
    '      // Skip if not born yet or fully faded',
    '      if (age < 0.0 || age > decayDuration) continue;',
    '',
    '      // Decay phase: 0 = just born, 1 = fully gone',
    '      float phase = age / decayDuration;',
    '',
    '      // ── Evaluate SDF (with per-shape parallax depth) ──',
    '      float depthLayer = 0.5 + float(i) * 0.25;',
    '      vec2 localP = p - shape.center - mouseShift * depthLayer;',
    '      localP = rot2(shape.rotation) * localP;',
    '      float d = evalShape(localP, shape.type, shape.scale);',
    '',
    '      // ── Flash moment (first 0.2s) ──',
    '      float flashPhase = clamp(age / 0.2, 0.0, 1.0);',
    '      float isFlashing = 1.0 - flashPhase;',
    '      float beatMul = isStrong ? 1.4 : 0.8;',
    '',
    '      // ── Layer 1: Active shape fill (translucent, edge-bright gradient) ──',
    '      float fillAlpha = smoothstep(0.005, -0.005, d);',
    '      // Interior gradient: brighter at edges (d near 0), dimmer at center (d very negative)',
    '      float interiorDist = clamp(-d / (shape.scale * 0.25), 0.0, 1.0);',
    '      float edgeBrightness = 1.0 - interiorDist * 0.65;',
    '      float fillFade = exp(-age * 2.5);',
    '      float flashBright = isFlashing * 2.0 * beatMul + fillFade;',
    '      vec3 fillColor = decayColor(phase) * flashBright * edgeBrightness;',
    '',
    '      // During flash moment, override to white (still with edge gradient)',
    '      fillColor = mix(fillColor, vec3(2.5) * edgeBrightness, isFlashing * fillAlpha);',
    '',
    '      col += fillColor * fillAlpha * (1.0 - phase * phase) * u_glowIntensity * 0.5;',
    '',
    '      // ── Layer 2: Shape afterglow outline ──',
    '      float edgeWidth = 0.006 + 0.003 * (1.0 - phase);',
    '      float edge = smoothstep(edgeWidth, edgeWidth * 0.3, abs(d));',
    '      float edgeFade = 1.0 - phase * phase * phase;',
    '      vec3 edgeColor = decayColor(phase * 0.85) * edgeFade;',
    '',
    '      // Edge is brighter than fill',
    '      col += edgeColor * edge * u_glowIntensity * 1.2;',
    '',
    '      // ── Layer 3: Edge bloom (soft glow) ──',
    '      // Wider and softer during flash, tightens as shape decays',
    '      float bloomWidthFlash = isStrong ? 0.08 : 0.05;',
    '      float bloomWidthDecay = 0.015 + 0.015 * (1.0 - phase);',
    '      float bloomWidth = mix(bloomWidthDecay, bloomWidthFlash, isFlashing);',
    '      float bloom = exp(-abs(d) / bloomWidth);',
    '      float bloomIntensity = mix(0.3, 1.8 * beatMul, isFlashing) * (1.0 - phase);',
    '      vec3 bloomColor = decayColor(phase * 0.7);',
    '      // Add warm tint to hottest point of bloom',
    '      vec3 warmBloom = mix(bloomColor, bloomColor + vec3(0.15, 0.1, 0.05), bloom * isFlashing);',
    '      col += warmBloom * bloom * bloomIntensity * u_glowIntensity * 0.4;',
    '',
    '      // Extra hot bloom during flash — warm-tinted white core',
    '      if (age < 0.25) {',
    '        float hotBloomWidth = isStrong ? 0.10 : 0.06;',
    '        float hotBloom = exp(-abs(d) / hotBloomWidth) * isFlashing;',
    '        col += vec3(0.95, 0.92, 0.85) * hotBloom * u_glowIntensity * 0.7 * beatMul;',
    '      }',
    '',
    '      // ── Layer 4: Chromatic fringe ──',
    '      // Pronounced RGB split at edges, especially during mid-decay (cyan→magenta)',
    '      float fringePeak = sin(clamp(phase * PI, 0.0, PI));',
    '      float fringeAmount = fringePeak * 0.035;',
    '      if (fringeAmount > 0.001) {',
    '        vec2 fringeDir = normalize(localP + vec2(0.001));',
    '        // Wider fringe sampling for more visible separation',
    '        float dR = evalShape(localP + fringeDir * fringeAmount, shape.type, shape.scale);',
    '        float dB = evalShape(localP - fringeDir * fringeAmount, shape.type, shape.scale);',
    '        // Also sample at half-offset for a softer outer halo',
    '        float dR2 = evalShape(localP + fringeDir * fringeAmount * 0.5, shape.type, shape.scale);',
    '        float dB2 = evalShape(localP - fringeDir * fringeAmount * 0.5, shape.type, shape.scale);',
    '        float fringeEdgeW = edgeWidth * 2.0;',
    '        float edgeR = smoothstep(fringeEdgeW, fringeEdgeW * 0.2, abs(dR));',
    '        float edgeB = smoothstep(fringeEdgeW, fringeEdgeW * 0.2, abs(dB));',
    '        float edgeR2 = smoothstep(fringeEdgeW * 1.5, fringeEdgeW * 0.3, abs(dR2));',
    '        float edgeB2 = smoothstep(fringeEdgeW * 1.5, fringeEdgeW * 0.3, abs(dB2));',
    '        float fringeFade = edgeFade * 0.8;',
    '        col.r += (edgeR + edgeR2 * 0.5) * fringeFade * 0.5;',
    '        col.b += (edgeB + edgeB2 * 0.5) * fringeFade * 0.5;',
    '      }',
    '    }',
    '  }',
    '',
    '  // ── Layer 6: Scanline overlay ──',
    '  float scanline = sin(fragCoord.y * 1.5) * 0.5 + 0.5;',
    '  scanline = 0.92 + scanline * 0.08;',
    '  col *= scanline;',
    '',
    '  // ── Vignette ──',
    '  vec2 vc = uv - 0.5;',
    '  float vig = 1.0 - dot(vc, vc) * 1.8;',
    '  vig = clamp(vig, 0.0, 1.0);',
    '  vig = pow(vig, 0.5);',
    '  col *= vig;',
    '',
    '  // ── Film grain ──',
    '  float grain = (fract(sin(dot(fragCoord, vec2(12.9898, 78.233)) + fract(t * 0.1) * 100.0) * 43758.5453) - 0.5) * 0.025;',
    '  col += grain;',
    '',
    '  // ── ACES tone mapping ──',
    '  col = ACESFilm(col);',
    '',
    '  // ── Gamma correction ──',
    '  col = pow(max(col, 0.0), vec3(0.95));',
    '',
    '  gl_FragColor = vec4(col, 1.0);',
    '}',
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(prog));
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uTime = gl.getUniformLocation(prog, 'u_time');
  var uRes = gl.getUniformLocation(prog, 'u_res');
  var uFlashRate = gl.getUniformLocation(prog, 'u_flashRate');
  var uGlowIntensity = gl.getUniformLocation(prog, 'u_glowIntensity');
  var uMouse = gl.getUniformLocation(prog, 'u_mouse');

  var flashRateVal = 0.7;
  var glowIntensityVal = 1.0;

  var mouseXVal = -1, mouseYVal = -1;
  canvas.addEventListener('mousemove', function(e) {
    mouseXVal = e.clientX * dpr;
    mouseYVal = (canvas.clientHeight - e.clientY) * dpr;
  });
  canvas.addEventListener('mouseleave', function() {
    mouseXVal = -1; mouseYVal = -1;
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, { passive: false });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    mouseXVal = touch.clientX * dpr;
    mouseYVal = (canvas.clientHeight - touch.clientY) * dpr;
  }, { passive: false });
  canvas.addEventListener('touchend', function() {
    mouseXVal = -1; mouseYVal = -1;
  });

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var needsResize = true;

  function resize() {
    needsResize = false;
    var w = Math.round(canvas.clientWidth * dpr);
